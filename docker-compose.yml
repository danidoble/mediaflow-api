services:
  api:
    build: .
    image: danidoble/mediaflow-api:latest
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  worker:
    build: .
    image: danidoble/mediaflow-api:latest
    # To scale workers: docker compose up --scale worker=4
    # deploy.replicas: 1
    command: celery -A src.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # ffmpeg is CPU/memory intensive — tune to your host
          cpus: "2.0"
          memory: 2G
    restart: unless-stopped

  beat:
    build: .
    image: danidoble/mediaflow-api:latest
    command: celery -A src.worker.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediaflow}
      POSTGRES_DB: ${POSTGRES_DB:-mediaflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mediaflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET:-mediaflow};
      /usr/bin/mc policy set none local/${MINIO_BUCKET:-mediaflow};
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
